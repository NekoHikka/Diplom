<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Вхід - Розумні Фінанси</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='logo.png') }}"
    />
    <style>
      body {
        background-color: #121212;
        color: #fff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: #1e1e1e;
        padding: 30px;
        border-radius: 10px;
        border: 1px solid #333;
        text-align: center;
        width: 300px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #444;
        background: #2a2a2a;
        color: white;
        box-sizing: border-box;
      }
      .btn {
        width: 100%;
        padding: 12px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
      }
      .btn:hover {
        opacity: 0.8;
      }
      a {
        color: #2196f3;
        text-decoration: none;
        font-size: 14px;
      }
      /* 📱 МОБІЛЬНА АДАПТАЦІЯ (АЛЬФА-ВЕРСІЯ) */
      @media (max-width: 768px) {
        /* Зменшуємо відступи по краях екрана */
        body {
          padding: 10px;
          margin: 0;
        }
        .card {
          padding: 15px;
          margin-bottom: 15px;
        }

        /* Всі сітки (графіки, статистика) стають в одну колонку */
        .grid {
          grid-template-columns: 1fr;
          gap: 15px;
        }

        /* Робимо верхнє меню зручним для пальців */
        .no-print {
          flex-direction: column;
          align-items: stretch !important;
          gap: 10px;
          text-align: center;
        }
        .no-print a,
        .no-print span {
          margin-right: 0 !important;
          width: 100%;
          display: block;
          padding: 10px 0;
          background-color: var(--input-bg);
          border-radius: 8px;
        }
        .no-print div {
          flex-direction: column;
          width: 100%;
          gap: 10px;
          margin-left: 0 !important;
        }
        .no-print button,
        .no-print a.btn {
          width: 100%;
          box-sizing: border-box;
        }

        /* Елементи форм і пульту ШІ */
        form > div {
          flex-direction: column;
          align-items: stretch !important;
        }
        select,
        input {
          width: 100% !important;
          margin-top: 5px;
        }

        /* Кнопки ШІ стають одна під одною */
        form .btn {
          width: 100%;
          flex: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Вхід в систему</h2>
      {% if error %}
      <p style="color: #ff4d4d; font-size: 14px">{{ error }}</p>
      {% endif %}

      <form action="/login" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <input type="text" name="username" placeholder="Логін" required />
        <input type="password" name="password" placeholder="Пароль" required />
        <button type="submit" class="btn">Увійти</button>
      </form>

      <p style="margin-top: 20px">
        <a href="/register">Ще немає акаунту? Реєстрація</a>
      </p>
    </div>
  </body>
</html>
