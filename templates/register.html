<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Реєстрація - Розумні Фінанси</title>
    <style>
      body {
        background-color: #121212;
        color: #fff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: #1e1e1e;
        padding: 30px;
        border-radius: 10px;
        border: 1px solid #333;
        text-align: center;
        width: 300px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #444;
        background: #2a2a2a;
        color: white;
        box-sizing: border-box;
      }
      .btn {
        width: 100%;
        padding: 12px;
        background: #2196f3;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
      }
      .btn:hover {
        opacity: 0.8;
      }
      a {
        color: #4caf50;
        text-decoration: none;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Реєстрація</h2>
      {% if error %}
      <p style="color: #ff4d4d; font-size: 14px">{{ error }}</p>
      {% endif %}

      <form action="/register" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <input type="text" name="username" placeholder="Логін" required />
        <input type="password" name="password" placeholder="Пароль" required />
        <button type="submit" class="btn">Зареєструватися</button>
      </form>

      <p style="margin-top: 20px"><a href="/login">Вже є акаунт? Увійти</a></p>
    </div>
  </body>
</html>
