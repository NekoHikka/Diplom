<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Реєстрація - Розумні Фінанси</title>
    <script>
      if (localStorage.getItem("theme") === "light")
        document.documentElement.setAttribute("data-theme", "light");
    </script>
    <style>
      :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-color: #ffffff;
        --border-color: #333333;
        --input-bg: #2a2a2a;
      }
      [data-theme="light"] {
        --bg-color: #f4f4f9;
        --card-bg: #ffffff;
        --text-color: #333333;
        --border-color: #dddddd;
        --input-bg: #ffffff;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background-color: var(--card-bg);
        padding: 40px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        box-sizing: border-box;
      }
      .btn {
        padding: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        margin-top: 25px;
        color: white;
        background-color: #4caf50;
        font-size: 16px;
        transition: 0.2s;
      }
      .btn:hover {
        background-color: #45a049;
      }

      .input-group {
        margin-top: 20px;
        text-align: left;
      }
      .input-wrapper {
        position: relative;
        margin-top: 8px;
      }
      input {
        width: 100%;
        padding: 14px;
        padding-right: 45px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: var(--input-bg);
        color: var(--text-color);
        box-sizing: border-box;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: #4caf50;
      }

      /* Іконка ока */
      .eye-icon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 18px;
        user-select: none;
        opacity: 0.6;
        transition: 0.2s;
      }
      .eye-icon:hover {
        opacity: 1;
      }

      /* Блок з помилками */
      .error-box {
        background-color: rgba(255, 77, 77, 0.1);
        color: #ff4d4d;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid rgba(255, 77, 77, 0.3);
        margin-bottom: 25px;
        font-size: 14px;
        line-height: 1.6;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="card" style="text-align: center">
      <h2 style="color: #4caf50; margin-top: 0">📝 Реєстрація</h2>

      {% if error %}
      <div class="error-box">{{ error | safe }}</div>
      {% endif %}

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="input-group">
          <label style="font-size: 14px; color: #aaa; font-weight: bold"
            >Логін</label
          >
          <div class="input-wrapper">
            <input
              type="text"
              name="username"
              placeholder="Введіть логін..."
              required
            />
          </div>
          <div style="font-size: 12px; color: #888; margin-top: 5px">
            3-20 символів (латиниця, цифри, _)
          </div>
        </div>

        <div class="input-group">
          <label style="font-size: 14px; color: #aaa; font-weight: bold"
            >Пароль</label
          >
          <div class="input-wrapper">
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Введіть пароль..."
              required
            />
            <span
              class="eye-icon"
              onclick="togglePassword()"
              title="Показати/Сховати пароль"
              >👁️</span
            >
          </div>
          <div style="font-size: 12px; color: #888; margin-top: 5px">
            Мін. 8 символів, A-Z, a-z, 0-9
          </div>
        </div>

        <button type="submit" class="btn">Зареєструватися</button>
      </form>

      <p style="margin-top: 25px; font-size: 14px">
        Вже маєте акаунт?
        <a
          href="/login"
          style="color: #4caf50; text-decoration: none; font-weight: bold"
          >Увійти</a
        >
      </p>
    </div>

    <script>
      function togglePassword() {
        const pwdInput = document.getElementById("password");
        if (pwdInput.type === "password") {
          pwdInput.type = "text";
        } else {
          pwdInput.type = "password";
        }
      }
    </script>
  </body>
</html>
