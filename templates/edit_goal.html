<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Редагування цілі</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='logo.png') }}"
    />
    <script>
      if (localStorage.getItem("theme") === "light")
        document.documentElement.setAttribute("data-theme", "light");
    </script>
    <style>
      :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-color: #ffffff;
        --border-color: #333333;
        --input-bg: #2a2a2a;
        --input-text: #ffffff;
        --input-border: #444444;
        color-scheme: dark;
      }
      [data-theme="light"] {
        --bg-color: #f4f4f9;
        --card-bg: #ffffff;
        --text-color: #333333;
        --border-color: #dddddd;
        --input-bg: #ffffff;
        --input-text: #333333;
        --input-border: #cccccc;
        color-scheme: light;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      .card {
        background-color: var(--card-bg);
        padding: 30px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        display: inline-block;
        text-align: left;
        width: 350px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      .btn {
        padding: 10px;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        flex: 1;
        font-weight: bold;
        text-decoration: none;
        text-align: center;
      }
      input {
        background-color: var(--input-bg);
        color: var(--text-color);
        border: 1px solid var(--input-border);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 15px;
        outline: none;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 20px;
      }
      label {
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 5px;
        display: block;
        opacity: 0.8;
      }
      .acc-pill {
        background-color: var(--input-bg);
        border: 1px solid var(--border-color);
        padding: 5px 12px;
        border-radius: 15px;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
        transition: 0.2s;
        color: var(--text-color);
      }
      .acc-pill.active {
        background-color: #2196f3;
        color: white;
        border-color: #2196f3;
      }
      /* 📱 МОБІЛЬНА АДАПТАЦІЯ (АЛЬФА-ВЕРСІЯ) */
      @media (max-width: 768px) {
        /* Зменшуємо відступи по краях екрана */
        body {
          padding: 10px;
          margin: 0;
        }
        .card {
          padding: 15px;
          margin-bottom: 15px;
        }

        /* Всі сітки (графіки, статистика) стають в одну колонку */
        .grid {
          grid-template-columns: 1fr;
          gap: 15px;
        }

        /* Робимо верхнє меню зручним для пальців */
        .no-print {
          flex-direction: column;
          align-items: stretch !important;
          gap: 10px;
          text-align: center;
        }
        .no-print a,
        .no-print span {
          margin-right: 0 !important;
          width: 100%;
          display: block;
          padding: 10px 0;
          background-color: var(--input-bg);
          border-radius: 8px;
        }
        .no-print div {
          flex-direction: column;
          width: 100%;
          gap: 10px;
          margin-left: 0 !important;
        }
        .no-print button,
        .no-print a.btn {
          width: 100%;
          box-sizing: border-box;
        }

        /* Елементи форм і пульту ШІ */
        form > div {
          flex-direction: column;
          align-items: stretch !important;
        }
        select,
        input {
          width: 100% !important;
          margin-top: 5px;
        }

        /* Кнопки ШІ стають одна під одною */
        form .btn {
          width: 100%;
          flex: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 style="text-align: center; margin-top: 0; margin-bottom: 25px">
        🎯 Редагувати ціль
      </h2>
      <form action="/edit_goal/{{ g.id }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label>Назва цілі:</label>
        <input type="text" name="name" value="{{ g.name }}" required />
        <label>Необхідна сума (грн):</label>
        <input
          type="number"
          name="target_amount"
          value="{{ g.target_amount }}"
          required
        />

        <label>Звідки рахувати гроші:</label>
        <div
          id="goal-pills-edit"
          style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px"
        >
          <label class="acc-pill {% if not selected_ids %}active{% endif %}">
            <input
              type="checkbox"
              name="account_ids"
              value="all"
              {%
              if
              not
              selected_ids
              %}checked{%
              endif
              %}
              style="display: none"
            />Всі
          </label>
          {% for acc in accounts %}
          <label
            class="acc-pill {% if acc.id in selected_ids %}active{% endif %}"
          >
            <input
              type="checkbox"
              name="account_ids"
              value="{{ acc.id }}"
              {%
              if
              acc.id
              in
              selected_ids
              %}checked{%
              endif
              %}
              style="display: none"
            />{{ acc.name }}
          </label>
          {% endfor %}
        </div>

        <div style="display: flex; gap: 10px">
          <button type="submit" class="btn" style="background-color: #2196f3">
            Зберегти
          </button>
          <a href="/" class="btn" style="background-color: #555">Скасувати</a>
        </div>
      </form>
    </div>

    <script>
      const container = document.getElementById("goal-pills-edit");
      const pills = container.querySelectorAll(".acc-pill");
      const allPill =
        container.querySelector('input[value="all"]').parentElement;

      pills.forEach((pill) => {
        const checkbox = pill.querySelector("input");
        pill.addEventListener("click", (e) => {
          e.preventDefault();
          if (checkbox.value === "all") {
            pills.forEach((p) => {
              p.classList.remove("active");
              p.querySelector("input").checked = false;
            });
            pill.classList.add("active");
            checkbox.checked = true;
          } else {
            allPill.classList.remove("active");
            allPill.querySelector("input").checked = false;
            checkbox.checked = !checkbox.checked;
            if (checkbox.checked) pill.classList.add("active");
            else pill.classList.remove("active");
            const anyChecked = Array.from(pills).some(
              (p) => p.querySelector("input").checked,
            );
            if (!anyChecked) {
              allPill.classList.add("active");
              allPill.querySelector("input").checked = true;
            }
          }
        });
      });
    </script>
  </body>
</html>
