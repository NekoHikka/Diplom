<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Редагування запису</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='logo.png') }}"
    />
    <script>
      if (localStorage.getItem("theme") === "light")
        document.documentElement.setAttribute("data-theme", "light");
    </script>
    <style>
      :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-color: #ffffff;
        --border-color: #333333;
        --input-bg: #2a2a2a;
        --input-text: #ffffff;
        --input-border: #444444;
        color-scheme: dark;
      }
      [data-theme="light"] {
        --bg-color: #f4f4f9;
        --card-bg: #ffffff;
        --text-color: #333333;
        --border-color: #dddddd;
        --input-bg: #ffffff;
        --input-text: #333333;
        --input-border: #cccccc;
        color-scheme: light;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 50px;
        transition: 0.3s;
      }
      .card {
        background-color: var(--card-bg);
        padding: 30px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        display: inline-block;
        text-align: left;
        width: 350px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      .btn {
        padding: 10px;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        flex: 1;
        font-weight: bold;
        text-decoration: none;
        text-align: center;
        transition: 0.2s;
      }
      .btn:hover {
        opacity: 0.9;
      }
      input,
      select {
        background-color: var(--input-bg);
        color: var(--input-text);
        border: 1px solid var(--input-border);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
        box-sizing: border-box;
        width: 100%;
        margin-bottom: 15px;
      }
      input:focus,
      select:focus {
        border-color: #4caf50;
      }
      label {
        color: var(--text-color);
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 5px;
        display: block;
        opacity: 0.8;
      }
      select {
        appearance: none;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 12px center;
        background-size: 16px;
      }
      [data-theme="light"] select {
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      ::-webkit-calendar-picker-indicator {
        filter: invert(1);
        cursor: pointer;
      }
      [data-theme="light"] ::-webkit-calendar-picker-indicator {
        filter: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 style="text-align: center; margin-top: 0; margin-bottom: 25px">
        ✏️ Редагувати запис
      </h2>
      <form action="/edit/{{ t.id }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label>Тип:</label>
        <select name="type" id="edit_type" required>
          <option value="Витрата">Витрата</option>
          <option value="Дохід">Дохід</option>
        </select>

        <label>Рахунок:</label>
        <select name="account_id" id="edit_account" required>
          {% for acc in accounts %}
          <option value="{{ acc.id }}">💳 {{ acc.name }}</option>
          {% endfor %}
        </select>

        <label>Категорія:</label>
        <select name="category" id="edit_category" required></select>

        <label>Дата:</label>
        <input
          type="date"
          name="date"
          value="{{ t.date.strftime('%Y-%m-%d') }}"
          required
        />

        <label>Сума (грн):</label>
        <input
          type="number"
          name="amount"
          step="0.01"
          value="{{ t.amount }}"
          required
        />

        <label>Опис:</label>
        <input type="text" name="description" value="{{ t.description }}" />

        <div style="display: flex; gap: 10px; margin-top: 10px">
          <button type="submit" class="btn" style="background-color: #4caf50">
            Зберегти
          </button>
          <a href="/" class="btn" style="background-color: #555">Скасувати</a>
        </div>
      </form>
    </div>

    <script>
      const expCats = {{ exp_cats|tojson }};
      const incCats = {{ inc_cats|tojson }};
      const typeSelect = document.getElementById('edit_type');
      const catSelect = document.getElementById('edit_category');
      const accSelect = document.getElementById('edit_account');

      function updateCategories() {
          catSelect.innerHTML = '';
          const opts = typeSelect.value === 'Витрата' ? expCats : incCats;
          opts.forEach(c => {
              let o = document.createElement('option'); o.value = c; o.innerText = c; catSelect.appendChild(o);
          });
      }

      typeSelect.addEventListener('change', updateCategories);

      // Встановлюємо старі значення
      typeSelect.value = "{{ t.type }}";
      updateCategories();
      catSelect.value = "{{ t.category }}";
      accSelect.value = "{{ t.account_id }}";
    </script>
  </body>
</html>
